name: Drift Monitoring

on:
  schedule:
    # Daily at 09:00 UTC. Daily matches the 24-48h ground-truth lag of a count model:
    # checking more often cannot surface accuracy degradation any earlier and only adds
    # alert noise and CI cost, while a weekly cadence would let drift run for days.
    - cron: '0 9 * * *'
  push:
    branches: [main]
    paths:
      - 'week4/data/**'
      - 'week4/scripts/**'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: week4
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # data parquet files are stored in Git LFS; without this the runner
                      # only checks out pointer text and the scripts crash reading it.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitoring tests
        run: python -m pytest scripts/test_monitoring.py -q

      - name: Compute monitoring metrics
        id: metrics
        # Loads baseline + Feb 2-28 window, runs the 8 metrics, checks thresholds, writes
        # metrics-*.json, and exits non-zero if any CRITICAL alert fires.
        run: python scripts/compute_metrics.py

      - name: Detect drift patterns
        id: drift
        if: always()   # informational log; run it even when the metrics step failed critical.
        run: python scripts/detect_drift.py

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-metrics
          path: week4/metrics-*.json
          if-no-files-found: ignore

      - name: Create alert issue if drift detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift alert — monitoring run ${context.runId}`,
              body: [
                'The daily drift monitoring job fired a **CRITICAL** alert.',
                '',
                `See the run log and metrics artifact for details: ${run}`,
                '',
                'Next steps: review which segments/features breached threshold, then assess',
                'whether the retraining trigger conditions are met (see week4/REPORT.md).'
              ].join('\n'),
              labels: ['drift-alert']
            })

      - name: Monitoring complete
        if: success()
        run: echo "Drift monitoring complete - no critical alerts."
